<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — Promote.dev</title>
<meta name="description" content="Manage your Promote.dev plan, post allowance, Instagram connection, and daily publishing queue.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23000000'/><text x='11' y='47' font-family='Arial,sans-serif' font-weight='700' font-size='44' fill='%23F5F5F6'>P</text><rect x='41' y='41' width='13' height='6' rx='2' fill='%23FFDD00'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/hooklab.css">
<style>
.page { padding: 52px 0 90px; max-width: 640px; }
.page h1 { font-size: clamp(28px, 4vw, 40px); margin-bottom: 30px; }
.acct-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; }
.acct-card h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
.who { display: flex; align-items: center; gap: 14px; }
.who img { width: 44px; height: 44px; border-radius: 50%; }
.who .n { font-weight: 700; }
.who .e { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.row { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
.row:last-child { border-bottom: none; }
.row .v { font-family: var(--mono); font-size: 13px; color: var(--ink-2); }
.usage-track { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; margin: 10px 0 6px; }
.usage-fill { height: 100%; border-radius: 999px; background: var(--ink); transition: width .4s cubic-bezier(.22,1,.36,1); }
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
.plan-badge { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 4px 12px; border-radius: 999px; }
.plan-badge.pro { background: var(--ink); color: #000; }
.plan-badge.free { background: var(--glass-2); color: var(--ink-2); }
.queue-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.queue-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--radius-s); font-size: 13.5px; }
.queue-item .qi-main { min-width: 0; }
.queue-item .qi-date { font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
.queue-item .qi-heading { font-weight: 600; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.queue-item .qi-error { font-size: 12px; color: var(--danger); margin-top: 2px; }
.status-pill { font-family: var(--mono); font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; flex-shrink: 0; }
.status-pill.queued { background: var(--glass-2); color: var(--ink-2); }
.status-pill.publishing, .status-pill.submitted, .status-pill.verifying { background: rgba(74,144,226,.16); color: #7eb6ff; }
.status-pill.posted { background: var(--ink); color: #000; }
.status-pill.failed, .status-pill.blocked { background: var(--danger-soft); color: var(--danger); }
.status-pill.skipped { background: var(--glass-2); color: var(--muted); }
.automation-health { display: flex; gap: 11px; align-items: flex-start; padding: 12px 14px; margin: 14px 0; border: 1px solid var(--line); border-radius: var(--radius-s); background: var(--surface-2); }
.automation-health .health-dot { width: 9px; height: 9px; margin-top: 5px; border-radius: 50%; flex: 0 0 auto; background: var(--muted); }
.automation-health.healthy .health-dot { background: #36c98f; box-shadow: 0 0 0 4px rgba(54,201,143,.12); }
.automation-health.running .health-dot { background: #7eb6ff; box-shadow: 0 0 0 4px rgba(126,182,255,.12); }
.automation-health.attention .health-dot { background: var(--danger); box-shadow: 0 0 0 4px var(--danger-soft); }
.automation-health .health-title { font-size: 13.5px; font-weight: 700; }
.automation-health .health-copy { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 2px; }
.plat-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 2px; }
.plat-chip { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 7px 14px; border-radius: 999px; border: 1px solid var(--line); }
.plat-chip.on { background: var(--ink); color: #000; border-color: var(--ink); }
.plat-chip.off { background: transparent; color: var(--muted); }
.plat-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .9; }
@media (max-width: 640px) {
  .page { padding: 36px 18px 64px; }
  .page h1 { margin-bottom: 24px; font-size: 38px; letter-spacing: 0; }
  .acct-card { padding: 20px; border-radius: 20px; }
  .acct-card h2 { font-size: 17px; }
  .acct-card p, .acct-card #connect-err { font-size: 15.5px !important; line-height: 1.55; }

  .who { gap: 14px; }
  .who img { width: 52px; height: 52px; }
  .who .n { font-size: 17px; }
  .who .e { font-size: 14px; line-height: 1.4; overflow-wrap: anywhere; }

  .row { align-items: flex-start; flex-direction: column; gap: 4px; padding: 14px 0; font-size: 16px; }
  .row .v { font-size: 14.5px; }
  .actions { align-items: stretch; flex-direction: column; }
  .actions .btn { width: 100%; }
  .plan-badge { font-size: 12px; padding: 6px 12px; }

  .queue-item { align-items: stretch; flex-direction: column; padding: 15px; font-size: 15px; }
  .queue-item .qi-date { font-size: 13px; }
  .queue-item .qi-heading { font-size: 15.5px; white-space: normal; }
  .queue-item .qi-error { font-size: 13.5px; }
  .status-pill { align-self: flex-start; min-height: 30px; padding: 6px 10px; font-size: 12px; }
  .plat-chip { min-height: 44px; font-size: 13px; }
}
</style>
</head>
<body>
<main class="page wrap">
  <h1 class="display">Account</h1>

  <div class="acct-card" id="who-card">
    <div class="who" id="who"><span class="stat">Loading…</span></div>
  </div>

  <div class="acct-card">
    <h2>Your plan and posts</h2>
    <div id="plan-body"><span class="stat">Loading…</span></div>
  </div>

  <div class="acct-card">
    <h2>Create all month with Pro</h2>
    <div class="actions">
      <button class="btn btn-primary" id="go-pro" style="display:none">Upgrade to Promote.dev Pro — $19/month</button>
      <a class="btn btn-ghost" id="manage-sub" href="/api/checkout" style="display:none">Manage subscription</a>
    </div>
  </div>

  <div class="acct-card" id="autopilot-card" style="display:none">
    <h2>Daily Instagram publishing</h2>
    <div id="autopilot-body"><span class="stat">Loading…</span></div>
  </div>

  <div class="acct-card">
    <div class="actions" style="margin-top:0">
      <button class="btn btn-ghost btn-sm" id="signout">Sign out</button>
      <a class="btn btn-ghost btn-sm" href="/privacy">Privacy</a>
      <a class="btn btn-ghost btn-sm" href="/terms">Terms</a>
    </div>
  </div>
</main>

<script src="/nav.js" defer></script>
<script src="/pro.js" defer></script>
<script>
function el(id) { return document.getElementById(id); }
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
var CUR_TIER = 'free';

window.addEventListener('load', function () {
  var ready = (window.TGUser && TGUser.ready) ? TGUser.ready : Promise.resolve(null);
  ready.then(function (u) {
    if (!u) { window.location.href = '/api/auth/google'; return; }
    render(u);
    loadSocial();
  });
});

function render(u) {
  CUR_TIER = u.tier || 'free';
  el('who').innerHTML =
    (u.picture ? '<img src="' + esc(u.picture) + '" alt="" referrerpolicy="no-referrer">' : '') +
    '<div><div class="n">' + esc(u.name || '') + ' <span class="plan-badge ' + (u.tier === 'pro' ? 'pro' : 'free') + '">' + (u.tier === 'pro' ? 'Pro' : 'Free') + '</span></div>' +
    '<div class="e">' + esc(u.email || '') + '</div></div>';

  var body = '';
  if (u.tier === 'pro') {
    var used = u.carouselsUsed || 0, lim = u.carouselsLimit || 30;
    body += '<div class="row"><span>Pro $19/month — posts this month</span><span class="v">' + used + ' / ' + lim + '</span></div>' +
      '<div class="usage-track"><div class="usage-fill" style="width:' + Math.min(100, used / lim * 100) + '%"></div></div>';
  } else {
    var fUsed = u.freeCarouselsUsed || 0, fLim = u.freeCarouselsLimit || 3;
    body += '<div class="row"><span>Free posts used</span><span class="v">' + fUsed + ' / ' + fLim + '</span></div>' +
      '<div class="usage-track"><div class="usage-fill" style="width:' + Math.min(100, fUsed / fLim * 100) + '%"></div></div>';
  }
  body += '<div class="row"><span>Credits</span><span class="v">' + (u.credits || 0) + '</span></div>';
  el('plan-body').innerHTML = body;

  if (u.tier === 'pro') {
    el('manage-sub').style.display = 'inline-flex';
  } else {
    el('go-pro').style.display = 'inline-flex';
  }
}

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch (e) { return iso; }
}

function fmtDateTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
  catch (e) { return iso; }
}

function healthHtml(health, queue) {
  if (!health || (!health.publish && !health.topup)) {
    return '<div class="automation-health attention"><span class="health-dot"></span><div>' +
      '<div class="health-title">Automation history is starting</div>' +
      '<div class="health-copy">The next worker run will record a permanent check-in here.</div></div></div>';
  }
  var publish = health.publish || {};
  var topup = health.topup || {};
  var running = publish.state === 'running' || topup.state === 'running';
  var state = health.ok ? 'healthy' : (running ? 'running' : 'attention');
  var title = health.ok ? 'Automation workers are healthy' : (running ? 'Automation is running now' : 'Automation needs attention');
  var checks = [];
  var publishAt = publish.finishedAt || publish.startedAt;
  var topupAt = topup.finishedAt || topup.startedAt;
  if (publishAt) checks.push('Posting checked ' + fmtDateTime(publishAt));
  if (topupAt) checks.push('Queue checked ' + fmtDateTime(topupAt));
  queue = queue || {};
  if ((queue.blocked || 0) > 0) {
    checks.push(queue.blocked + ' post' + (queue.blocked === 1 ? '' : 's') + ' blocked — reconnect the social account');
  } else if ((queue.submitted || 0) > 0) {
    checks.push(queue.submitted + ' post' + (queue.submitted === 1 ? '' : 's') + ' awaiting provider confirmation');
  } else if ((queue.due || 0) > 0) {
    checks.push(queue.due + ' post' + (queue.due === 1 ? '' : 's') + ' due — recovery will retry automatically');
  } else if (queue.next_at) {
    checks.push('Next post ' + fmtDateTime(queue.next_at));
  } else {
    checks.push('No post is currently scheduled');
  }
  var copy = checks.length ? checks.join(' · ') : (publish.message || topup.message || 'No completed worker run has been recorded yet.');
  return '<div class="automation-health ' + state + '"><span class="health-dot"></span><div>' +
    '<div class="health-title">' + esc(title) + '</div><div class="health-copy">' + esc(copy) + '</div></div></div>';
}

function loadSocial() {
  el('autopilot-card').style.display = 'block';
  fetch('/api/social', { credentials: 'same-origin' })
    .then(function (r) { return r.json(); })
    .then(renderSocial)
    .catch(function () { el('autopilot-body').innerHTML = '<span class="stat">Couldn’t load publishing status.</span>'; });
}

function renderSocial(d) {
  if (!d.connected) {
    // Never show a Connect button when the provider is temporarily unavailable.
    if (!d.enabled) {
      el('autopilot-body').innerHTML =
        '<p style="color:var(--muted);font-size:13.5px;">Instagram connection is temporarily unavailable. Your posts are safe — download the complete post and publish it manually while we restore the connection.</p>';
      return;
    }
    if (CUR_TIER !== 'pro') {
      el('autopilot-body').innerHTML =
        '<p style="color:var(--muted);font-size:13.5px;margin-bottom:16px;">Daily Instagram publishing is included with Pro. Connect your account once and Promote.dev will prepare, queue, and publish a fresh post for you each day.</p>' +
        '<a class="btn btn-primary" href="/api/checkout?plan=autopilot">Start daily publishing — $19/month</a>';
      return;
    }
    el('autopilot-body').innerHTML =
      '<p style="color:var(--muted);font-size:13.5px;margin-bottom:16px;">Connect Instagram once. Promote.dev will prepare, queue, and publish a fresh post for you each day.</p>' +
      '<button class="btn btn-primary" id="connect-social">Connect Instagram for daily publishing</button>' +
      '<div id="connect-err" style="color:var(--danger);font-size:13px;margin-top:12px;display:none;"></div>';
    wireLinkButton('connect-social', 'Connect Instagram for daily publishing');
    return;
  }

  // Connected: show WHICH platforms are actually linked, not an internal id.
  // d.linked null = couldn't verify -> plain Connected line, no false claims.
  var PLATFORMS = ['instagram', 'tiktok'];
  var html = '';
  if (Array.isArray(d.linked)) {
    var chips = PLATFORMS.concat(d.linked.filter(function (p) { return PLATFORMS.indexOf(p) < 0; }));
    html += '<div class="plat-row">' + chips.map(function (p) {
      var on = d.linked.indexOf(p) >= 0;
      return '<span class="plat-chip ' + (on ? 'on' : 'off') + '"><span class="dot"></span>' +
        esc(p) + (on ? '' : ' — not linked') + '</span>';
    }).join('') + '</div>';
    if (d.linked.length === 0) {
      html += '<p style="color:var(--danger);font-size:13px;margin-top:12px;">No accounts linked yet — posts can’t go out until you link one.</p>';
    }
  } else {
    html += '<div class="row"><span>Status</span><span class="v">Connected ✓</span></div>';
  }
  html += '<div class="actions"><button class="btn btn-ghost btn-sm" id="manage-social">Link / manage accounts</button></div>' +
    '<div id="connect-err" style="color:var(--danger);font-size:13px;margin-top:12px;display:none;"></div>';

  html += healthHtml(d.health, d.queue);

  var posts = d.posts || [];
  var queueHtml = posts.length
    ? '<div class="queue-list">' + posts.map(function (p) {
        var heading = (p.slides && p.slides[0] && (p.slides[0].heading || p.slides[0].text)) || '';
        var status = p.status || 'queued';
        var st = ['queued', 'publishing', 'submitted', 'verifying', 'posted', 'blocked', 'failed', 'skipped'].indexOf(status) >= 0 ? status : 'queued';
        var labels = { publishing: 'publishing', submitted: 'verifying', verifying: 'checking', blocked: 'needs action' };
        var label = labels[status] || (status === 'queued' && p.retries ? 'retry queued' : status);
        return '<div class="queue-item">' +
          '<div class="qi-main">' +
            '<div class="qi-date">' + esc(fmtDate(p.scheduled_at)) + ' · ' + esc(p.kind || '') + '</div>' +
            '<div class="qi-heading">' + esc(heading) + '</div>' +
            (status !== 'posted' && p.error ? '<div class="qi-error">' + esc(p.error) + '</div>' : '') +
          '</div>' +
          '<span class="status-pill ' + st + '">' + esc(label) + '</span>' +
        '</div>';
      }).join('') + '</div>'
    : '<p style="color:var(--muted);font-size:13.5px;">Your publishing queue is empty. The next daily post will be prepared within 24 hours.</p>';

  el('autopilot-body').innerHTML = html +
    '<div style="margin-top:16px;">' + queueHtml + '</div>';
  wireLinkButton('manage-social', 'Link / manage accounts');
}

// Both "Connect" (first time) and "Link / manage accounts" (already connected)
// go through the same flow: ask the server for a fresh hosted linking URL.
function wireLinkButton(id, label) {
  var btn = el(id);
  if (!btn) return;
  btn.addEventListener('click', function () {
    btn.disabled = true; btn.textContent = 'Opening…';
    fetch('/api/social', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'link' })
    }).then(function (r) { return r.json().then(function (j) { return { s: r.status, j: j }; }); })
      .then(function (res) {
        btn.disabled = false; btn.textContent = label;
        if (res.s === 200 && res.j.url) {
          window.open(res.j.url, '_blank');
        } else {
          var e = el('connect-err');
          e.textContent = (res.j && res.j.error) || 'Something went wrong. Please try again.';
          e.style.display = 'block';
        }
      })
      .catch(function () {
        btn.disabled = false; btn.textContent = label;
        var e = el('connect-err');
        e.textContent = 'Connection error. Please try again.';
        e.style.display = 'block';
      });
  });
}

el('go-pro').addEventListener('click', function () { TGPro._checkout('autopilot'); });
el('signout').addEventListener('click', function () {
  fetch('/api/auth/me', { method: 'POST', credentials: 'same-origin' }).then(function () {
    try { localStorage.removeItem('tg_user_cache'); } catch (e) {}
    window.location.href = '/';
  });
});
</script>
</body>
</html>
